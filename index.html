6 跌到 2.46，原油同期漲 40 倍。", "eps": "EP42", "code": "", "importance": "⭐⭐⭐⭐"}, {"name": "00672L 完整故事終章", "type": "📈 教科書案例", "desc": "WTI 從 -40 → 40 美元（40 倍漲幅），00672L 同期從 3.16 → 2.46（跌 22%）。完整故事：高點 → 負值 → 史詩級反彈 → 00672L 沒參與到。", "eps": "EP42", "code": "00672L", "importance": "⭐⭐⭐"}, {"name": "When vs If", "type": "📊 投資心法", "desc": "金融市場永遠在交易 When（時間），不是 If（事件）。預判需要三個元素：方向、幅度、時間，三個都對才能賺錢。", "eps": "EP42", "code": "", "importance": "⭐⭐⭐"}, {"name": "巴菲特護城河（浮存金）", "type": "📊 投資心法", "desc": "巴菲特模式 = 保險公司浮存金 + 危機時的特別股投資。低利率時代這個護城河正在被蠶食。手握 1370 億現金不抄底。", "eps": "EP42", "code": "", "importance": "⭐⭐⭐"}, {"name": "高股息 ETF 陷阱", "type": "📊 投資心法", "desc": "高股息可能是：(a) 公司基本面好主動發錢 (b) 沒成長機會被動發錢 (c) 吃老本配息。買之前要回答來源。", "eps": "EP42", "code": "", "importance": "⭐⭐"}, {"name": "被動投資有效性的前提", "type": "📊 投資心法", "desc": "被動投資 ETF 過去 10 年表現優於主動管理，是因為 (a) 零利率環境 (b) 美股超長牛市。這個前提不會永遠存在。", "eps": "EP42", "code": "", "importance": "⭐⭐"}, {"name": "房地產自住 vs 投資", "type": "💰 資金管理", "desc": "自住是消費品不是投資品，隨時可買不要等低點；投資要看 20 年維度，台北外圍供給持續增加，要選地段。", "eps": "EP42", "code": "", "importance": "⭐⭐"}, {"name": "比特幣純投機品論", "type": "📊 投資心法", "desc": "比特幣不適合不懂金融的人（純投機屬性），但有兩類買盤：投機者 + 已有儲備黃金的人（避險）。", "eps": "EP42", "code": "", "importance": "⭐⭐"}, {"name": "吃銀泡泰真", "type": "💰 資金管理", "desc": "股癌自創說法，用小錢實驗當學費。進軍陌生領域（傳產→電子、股票→期貨、台股→美股）必須先拿小錢實驗。", "eps": "EP42", "code": "", "importance": "⭐⭐"}, {"name": "Dark（影集）", "type": "🎬 影視", "desc": "Netflix 德國核電廠穿越劇，EP42 推薦。", "eps": "EP42", "code": "", "importance": "⭐"}, {"name": "Ozark（影集）", "type": "🎬 影視", "desc": "Netflix 洗錢劇，Bill Gates 推薦，EP42 加碼推薦。", "eps": "EP42", "code": "", "importance": "⭐"}, {"name": "唇骨派 ≠ 定唇派", "type": "💡概念", "desc": "市場上常見三派混淆：唇骨派（會暗示自己像定唇但常常錯）、存股派（時間決定一切）、定唇派（真的能預測滿足點）。唇骨派的問題是他們不承認自己會錯，把虧損包裝成「長期持有就好」。定唇派不同，他們對自己的進出場有意識，知道風險在哪。", "eps": "EP43", "code": "", "importance": "⭐⭐"}, {"name": "市場沒有穩賺的東西", "type": "💡概念", "desc": "任何投資標的都有風險，沒有穩賺這回事。如果有人自稱穩賺，他為什麼要借款 all in？事實上每個人（包括股癌自己）的策略都有失效的可能。重點是先認知風險，再談報酬。", "eps": "EP43", "code": "", "importance": "⭐⭐"}, {"name": "存股要看進場時間", "type": "💡概念", "desc": "存股派的問題在於他們忽略「時間風險」。2015 進場很爽、2006-2007 進場就被套住。「越跌越買」假象需先剔除「公司下市」風險。心理素質要夠才能撐過大跌。", "eps": "EP43", "code": "", "importance": "⭐⭐"}, {"name": "台灣金融股未來不是好存股標的", "type": "💡概念", "desc": "低利率時代金融股獲利結構受壓縮（淨息差縮小），台灣金融股未來 3-5 年可能走向歐美金融股那樣（零或負殖利率、股利縮水）。呼應 EP40 負利率主線，不適合當唯一存股標的。", "eps": "EP43", "code": "", "importance": "⭐⭐"}, {"name": "大獎章基金的量化交易哲學", "type": "💡概念", "desc": "James Simons 的大獎章基金方法論：用位資料（big data）+ 量化分析 + 冷酷無情的操作。歷史報酬嚇人但對外不收錢，外部投資人無法參與。這是量化交易的典範，對散戶的啟示是「別想模仿、學習紀律」。", "eps": "EP43", "code": "", "importance": "⭐⭐"}, {"name": "定唇是能跟股價相處的投資人", "type": "💡概念", "desc": "真正的定唇不是神準預測每天漲跌，而是能在多次「達到滿足點」之後順利出場、跟股價相處。定唇派的報酬來自紀律 + 多次小勝，不是單次大賺。", "eps": "EP43", "code": "", "importance": "⭐⭐"}, {"name": "量化交易 / 量化基金 (大獎章基金)", "type": "🏭產業", "desc": "", "eps": "EP43", "code": "", "importance": "⭐"}, {"name": "臺灣腦 vs 世界市場——不要用臺灣價值觀套全世界", "type": "💡概念", "desc": "在地緣政治/道德議題上，臺灣人對中共有強烈反感，但歐美用戶/投資人不一定在意。Zoom 70→200 美元、抖音/TikTok 國際化都是案例。市場的核心是這家公司有沒有夢、會不會賺錢，花邊新聞不一定反映在股價上。要看季報數字（使用者增長、付費轉換、營收結構）而非政治正確。", "eps": "EP44", "code": "", "importance": "⭐⭐"}, {"name": "Wishful thoughts 陷阱——不要把希望投射到交易市場", "type": "💡概念", "desc": "交易市場是獨立的驗證機制，不會因為你「希望」它漲就漲、不會因為你「希望」它跌就跌。要嘛用證據支持你的判斷，要嘛承認「我希望 X」不等於「X 會發生」。菜機應該多聽多看多消化，不要用願望代替分析。", "eps": "EP44", "code": "", "importance": "⭐⭐"}, {"name": "政治上你變不出真理，市場上可以——所以我們在市場決鬥", "type": "💡概念", "desc": "政治是價值觀問題（沒有客觀答案），市場是結果問題（有賺有賠）。股癌的立場：政治討論歡迎，但攻擊私訊是屁眼太小；有本事就在市場見真章。這呼應 EP41 「中共同路人之術」批判：把對手抹紅是為了選舉動員，不是事實辯論。", "eps": "EP44", "code": "", "importance": "⭐⭐"}, {"name": "屁眼不要太小的政治評論觀——有本事就出來討論", "type": "💡概念", "desc": "批判要對稱。股癌支持吳思懷 keep 皇上乾、支持批評同處黨、支持批評三倍券，立場可以不同但批評權要對等。網路上的極化審查（進步派強迫表態 + 川普時代的左膠審查）是同等問題，核心是「別人講話就是智商不足」這種態度。", "eps": "EP44", "code": "", "importance": "⭐⭐"}, {"name": "動態停利——分批出場的保守做法", "type": "💡概念", "desc": "面對超預期漲幅不知如何停利時，用動態停利法——以前一日收盤為基準，-5%/-8%/-10% 分三批出場。優點：往上漲不錯過大波段（持續在車上）、往下跌不受重傷（已部分停利）。搭配分批進場，是保守但完整的操作框架。", "eps": "EP44", "code": "", "importance": "⭐⭐"}, {"name": "Kyle Bass / Bill Ackman 全貌性誤解——你只看到部分", "type": "💡概念", "desc": "Kyle Bass 200 倍槓桿放空港元？其實只拿一小部位。Bill Ackman 爆賺？避險部位幾 % 翻身，主要部位還是受傷。全貌性概念：任何事件要看全局，不能從部分推論整體。Zoom 70→200 美元的過程中，所有審查爭議 + 資安攻擊 + 間諜指控 → 股價照漲，因為季報強勢。", "eps": "EP44", "code": "", "importance": "⭐⭐"}, {"name": "核心是這家公司有沒有夢、會不會賺錢", "type": "💡概念", "desc": "面對爭議性公司，判斷依據是 (a) 商業模式 (b) 夢的大小 (c) 實際賺錢能力 (d) 季報數字。花邊新聞（審查、資安、政治）只有在反映在使用者增長 / 付費轉換 / 營收結構時才重要。沒題材、沒夢的標的，本益比沒拉抬空間——法人連研究報告都不會出。股價不只是 EPS 決定，還要看本益比擴張空間。沒題材的本益比被壓縮，EPS 成長股價也跑不動。選股邏輯：EPS 成長 + 夢的想像 = 雙引擎。", "eps": "EP44", "code": "", "importance": "⭐⭐"}, {"name": "政府盡可能減少對社會控制——小政府論述", "type": "💡概念", "desc": "股癌的政治哲學核心。具體應用：進空令 = 求援兼裁判、漲跌幅上限 + 漲數限制 = 怪、ETF 續命規則 = 選擇性對誰好（會產生貪污）、健保自費醫材上限 = 政府把手伸進市場、最低薪資 = 反而讓事情更困難。最佳做法：像美國——零股交易、沒有漲跌幅限制，市場該怎麼走就怎麼走。", "eps": "EP44", "code": "", "importance": "⭐⭐"}, {"name": "健保是福利不像保險——條件限制其實合理", "type": "💡概念", "desc": "健保不像保險（保險是風險分攤），健保像福利（強制納保 + 薪資比例分攤）。既然是福利，就可以設定條件限制（量的管制），讓真正需要的人得到照顧、減少浪費。改革方向：用多的人付多一點（用量管制）、社會福利保護對象（老人家、特殊疾病）國家補助。", "eps": "EP44", "code": "", "importance": "⭐⭐"}, {"name": "題材講得漂亮但賺不到錢就是廢物", "type": "💡概念", "desc": "投資不能只看故事題材，要看實際營收 / 獲利能力。5G 基建端 / DWDM / 光通訊 / 風電 / 電動車等題材都有過炒作，但若營收沒跟上就是泡沫。判斷順序：題材（夢）→ 營收成長 → 獲利能力。題材只是故事，營收才是現實。", "eps": "EP44", "code": "", "importance": "⭐⭐"}, {"name": "槓桿 / 借錢買股 = 蠢到爆", "type": "💡概念", "desc": "槓桿放大獲利也放大虧損。你只想到槓桿下你會賺多少，沒想過賠錢會負債。借錢買股的話，跌到某個程度你會被斷頭 + 負債，一輩子翻不了身。正常人做法：用自己的閒錢投資，跌了還能等漲回來。槓桿是給有完整風險管理 + 緊急預備金的人用的，不是給散戶的。", "eps": "EP44", "code": "", "importance": "⭐⭐"}, {"name": "左膠的減法思維 vs 正常人的加法思維", "type": "💡概念", "desc": "左膠思維 = 你有什麼你不該有、我有什麼我也不能有（打倒老闆、打倒權貴）。正常人思維 = 你做一點我做一點，一起把事情做好。政治正確的極限：強迫表態、把中間派推到對立面，最終引起反感反而強化對手（投川普）。檢驗左膠的方法：問「怎麼辦」只會講理想的東西 = 左膠。因噎廢食是左膠典型錯誤（警暴 → defund police = 取消制度），出事了還是會打給警察。應用到投資：個別公司出包 ≠ 整個產業該死，要分清楚問題是「個案」還是「結構」。", "eps": "EP44", "code": "", "importance": "⭐⭐"}, {"name": "Zoom (ZM) / 視訊會議", "type": "🏭產業", "desc": "", "eps": "EP44", "code": "", "importance": "⭐"}, {"name": "抖音 / TikTok / 字節跳動", "type": "🏭產業", "desc": "", "eps": "EP44", "code": "", "importance": "⭐"}, {"name": "健保 / 自費醫材", "type": "🏭產業", "desc": "", "eps": "EP44", "code": "", "importance": "⭐"}, {"name": "美中脫鉤 / NASDAQ 中國因素公司", "type": "🏭產業", "desc": "", "eps": "EP44", "code": "", "importance": "⭐"}, {"name": "Podcast / 媒體 / KOL 圈", "type": "🏭產業", "desc": "", "eps": "EP44", "code": "", "importance": "⭐"}, {"name": "5G / DWDM / 光通訊 / 汽車材料 / 風電", "type": "🏭產業", "desc": "", "eps": "EP44", "code": "", "importance": "⭐"}, {"name": "美國政治 / 左膠 / Woke Culture", "type": "🏭產業", "desc": "", "eps": "EP44", "code": "", "importance": "⭐"}, {"name": "Michael Burry 是早洩型——ETF 泡沫論現階段不成立", "type": "💡概念", "desc": "Michael Burry 認為被動投資 ETF 會造成下一波金融海嘯（電影院踩踏理論）。股癌判斷現在還不會發生：參與被動投資的人還沒到 80-90% 危機點、台股 0050 佔大盤比重極小、有套利機制存在。Burry 在 2008 也是花了 2-3 年繳 CDS 保費才等到崩盤，他的預判需要時間兌現。現階段：可以放心的買全市場 ETF（0050），不要碰窄基 / 行業 ETF。", "eps": "EP45", "code": "", "importance": "⭐⭐"}, {"name": "所有的利多利空最終都會鈍化——定價理論", "type": "💡概念", "desc": "金融市場的定價機制會把所有資訊反映到股價。重複燒同樣的利空不會有第二次衝擊（北京二次疫情）。例外：必須是「驚喜級的轉變」（疫苗無效、病毒突變到口罩擋不住）才會二次衝擊。投資操作應用：第一次利空衝擊時要跑、第二次時不必恐慌。", "eps": "EP45", "code": "", "importance": "⭐⭐"}, {"name": "Robinhood 散戶當道——疫情受害股的最大買家", "type": "💡概念", "desc": "美國 Robinhood 公佈 top 100 持股，散戶愛買疫情受害股（航空、飯店、Hertz、房多多）。V 轉中散戶意外成為大贏家：散戶沒有避險觀念、敢重押；老鳥（巴菲特、達里）有風險控管反而錯過。兩面刃：散戶賺的是運氣不是實力（盤整 / 下跌就會加倍吐回去）。不要羨慕短期運氣，要看長期可持續性。", "eps": "EP45", "code": "", "importance": "⭐⭐"}, {"name": "能賺錢 ≠ 你是對的——為什麼要選最危險的", "type": "💡概念", "desc": "打破「賺錢 = 對」的迷思。詐騙車手也能賺錢、賣毒也能賺錢，但風險完全不同。股市同理：可以賺錢但你選了風險最高的方式（買破產股、買受害者股），長期會被淘汰。智慧在於選擇「能持續穩定做下去」的方式，不是「這次剛好賺到」的方式。", "eps": "EP45", "code": "", "importance": "⭐⭐"}, {"name": "Hertz 清算順序——股東劣後的數學", "type": "💡概念", "desc": "買破產公司股票時，清算時股東劣後——債權人優先，剩下的才是股東。假設公司價值清算後剩 5%，你持股 1% 也只拿回 0.05%（原來 1% 的 5%）。期望值計算必須包含清算情境，這是多數散戶忽略的事。", "eps": "EP45", "code": "", "importance": "⭐⭐"}, {"name": "一定要聽自己的——別人的判斷不等於你的判斷", "type": "💡概念", "desc": "你的營業員、前輩、KOL 都不該是你的決策依據。理由：資金量體不同、投資長短不同、風險承受不同、對賬單都可能作假。唯一可信的判斷源是你自己的回測、自己的資金、自己能承受的虧損。會拜神的人最危險（容易在跌時砍、在漲時追）。", "eps": "EP45", "code": "", "importance": "⭐⭐"}, {"name": "靠爸哲學——可以靠就要勇敢靠下去", "type": "💡概念", "desc": "家裡有公司可以投入，是「半個內線交易」（最清楚公司賺不賺錢）。如果家裡公司賺錢 → 擴大優勢。如果家裡普普 → 才轉戰股票。「面子」、「自食其力」這種話是謊言——靠爸不等於不努力，是站在巨人肩膀上。少奮鬥十年可以做更多事（學新的、陪家人、儲蓄投資）。", "eps": "EP45", "code": "", "importance": "⭐⭐"}, {"name": "放下屠刀立地成佛——套牢股的斷舍離", "type": "💡概念", "desc": "套牢股的最佳處置是斷舍離（認賠、轉換更好的標的）。不能拿沉沒成本當決策依據（70 跌到 20，賠的 50 已經是既定事實）。與其等它漲回來（常常不會），不如把 20 換成你看好的新標的，10 年後回頭看新標的可能帶來 5-10 倍獲利。繼續持有 = 再賠 10 年的時間成本 + 機會成本。", "eps": "EP45", "code": "", "importance": "⭐⭐"}, {"name": "錨定效應是大忌——不要用過去的價格定義現在的決策", "type": "💡概念", "desc": "行為經濟學的「錨定效應」——人會把過去的價格當成決策基準（原本 70，現在 20，所以「應該」會漲回去）。這是錯的：股價的公道價由基本面決定，不是由歷史價格決定。沉沒成本謬誤的另一面。決定賣不賣要回答「現在這個價格、未來 3 年的展望」，不是「我從 70 變 20 所以不甘心」。", "eps": "EP45", "code": "", "importance": "⭐⭐"}, {"name": "大戶散戶持股比例資料參考就好", "type": "💡概念", "desc": "券商軟體提供的「大戶持股 / 散戶持股 / 400-800 張比例」指標，統計上沒有正相關。大戶買可能是鞏固經營權（不用追價，慢慢接），散戶買可能只是跟風。唯一可信的判斷依據是股價行為本身。", "eps": "EP45", "code": "", "importance": "⭐⭐"}, {"name": "大學生投資——乖乖存錢、乖乖唸書", "type": "💡概念", "desc": "大學生最大的資產是「未來的時間 + 文憑的選擇權」，不是「現在的小錢」。先存錢、拿好文憑、未來再投資。不要為了小錢賠掉大未來。股癌自己的悔恨：國高中大學都沒好好唸書，現在回頭看才發現「沒更重要的事可做」。", "eps": "EP45", "code": "", "importance": "⭐⭐"}, {"name": "ETF / 被動投資泡沫論", "type": "🏭產業", "desc": "", "eps": "EP45", "code": "", "importance": "⭐"}, {"name": "Robinhood 散戶 / 疫情受害股", "type": "🏭產業", "desc": "", "eps": "EP45", "code": "", "importance": "⭐"}, {"name": "破產股票 / IBO (Initial Bankruptcy Offering)", "type": "🏭產業", "desc": "", "eps": "EP45", "code": "", "importance": "⭐"}, {"name": "中印邊境衝突 / 北韓 / 北京二次疫情 — 區域利空判斷框架", "type": "🏭產業", "desc": "", "eps": "EP45", "code": "", "importance": "⭐"}];

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function makeField(label, value) {
  var d = document.createElement('div');
  d.className = 'field';
  var b = document.createElement('b');
  b.textContent = label;
  d.appendChild(b);
  d.appendChild(document.createTextNode(value));
  return d;
}
network.on('click', function(params) {
  if (params.nodes.length > 0) {
    var idx = params.nodes[0];
    var n = rawNodes[idx];
    document.getElementById('info-title').textContent = n.name + (n.code ? ' (' + n.code + ')' : '');
    var body = document.getElementById('info-body');
    body.innerHTML = '';
    body.appendChild(makeField('類型', n.type));
    body.appendChild(makeField('重要性', n.importance));
    body.appendChild(makeField('描述', n.desc));
    var epsField = document.createElement('div');
    epsField.className = 'field';
    var epsLabel = document.createElement('b');
    epsLabel.textContent = '出現集數';
    epsField.appendChild(epsLabel);
    var epsDiv = document.createElement('div');
    epsDiv.className = 'eps';
    n.eps.split(', ').forEach(function(ep) {
      if (!ep) return;
      var span = document.createElement('span');
      span.className = 'ep-tag';
      span.textContent = ep;
      epsDiv.appendChild(span);
    });
    epsField.appendChild(epsDiv);
    body.appendChild(epsField);
    document.getElementById('info').style.display = 'block';
  }
});

network.on('click', function(params) {
  if (params.nodes.length === 0 && params.edges.length === 0) {
    document.getElementById('info').style.display = 'none';
  }
});

// Search functionality
document.getElementById('search').addEventListener('input', function(e) {
  var query = e.target.value.trim().toLowerCase();
  if (!query) {
    // Reset all nodes to full opacity
    var resetUpdates = [];
    rawNodes.forEach(function(n, i) {
      resetUpdates.push({ id: i, opacity: 1.0 });
    });
    nodes.update(resetUpdates);
    return;
  }
  var matched = [];
  var updates = [];
  rawNodes.forEach(function(n, i) {
    var haystack = (n.name + ' ' + n.code + ' ' + n.desc).toLowerCase();
    if (haystack.indexOf(query) !== -1) {
      matched.push(i);
      updates.push({ id: i, opacity: 1.0 });
    } else {
      updates.push({ id: i, opacity: 0.15 });
    }
  });
  nodes.update(updates);
  if (matched.length === 1) {
    network.focus(matched[0], { scale: 1.2, animation: true });
    network.selectNodes(matched);
  } else if (matched.length > 1) {
    network.fit({ nodes: matched, animation: true });
  }
});
</script>
